<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyMate AI — Your Smart Learning Companion</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:#0d1b3e; --card:#1a2a5e; --card2:#1e3070;
    --accent:#6c63ff; --teal:#00d4aa; --gold:#f5c518; --coral:#ff6b6b;
    --text:#e8eaf6; --muted:#8892b0; --border:rgba(108,99,255,0.25);
    --glow:0 0 30px rgba(108,99,255,0.3);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Space Grotesk',sans-serif;background:var(--navy);color:var(--text);min-height:100vh;}
  /* NAVBAR */
  .navbar{position:fixed;top:0;left:0;right:0;z-index:999;display:flex;align-items:center;justify-content:space-between;padding:14px 32px;background:rgba(13,27,62,0.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);}
  .nav-logo{display:flex;align-items:center;gap:8px;font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:800;}
  .nav-logo span{background:linear-gradient(90deg,var(--accent),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  .nav-links{display:flex;gap:20px;align-items:center;}
  .nav-links a{color:var(--muted);text-decoration:none;font-size:0.85rem;font-weight:500;cursor:pointer;transition:.2s;}
  .nav-links a:hover{color:var(--text);}
  .nav-right{display:flex;align-items:center;gap:12px;}
  .nav-streak{display:flex;align-items:center;gap:6px;background:rgba(245,197,24,0.12);border:1px solid rgba(245,197,24,0.3);border-radius:20px;padding:5px 12px;font-size:0.82rem;font-weight:700;color:var(--gold);cursor:pointer;}
  .nav-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--teal));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.82rem;cursor:pointer;}
  .btn-logout{background:rgba(255,107,107,0.15);border:1px solid rgba(255,107,107,0.4);color:#ff6b6b;padding:6px 14px;border-radius:8px;font-size:0.8rem;font-weight:600;cursor:pointer;transition:.2s;}
  .btn-logout:hover{background:rgba(255,107,107,0.3);}
 }
/* MODAL */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:2000;align-items:center;justify-content:center;}
  .modal-overlay.active{display:flex;}
  .modal-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:36px;width:90%;max-width:400px;}
  .modal-box h3{font-family:'Syne',sans-serif;font-size:1.25rem;margin-bottom:8px;}
  .modal-box p{color:var(--muted);font-size:0.85rem;margin-bottom:20px;}
  .modal-close{float:right;background:none;border:none;color:var(--muted);font-size:1.5rem;cursor:pointer;margin-top:-6px;}
   /* LOGIN */
  #loginPage{background:radial-gradient(ellipse at 20% 50%,rgba(108,99,255,0.2),transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(0,212,170,0.15),transparent 50%),var(--navy);align-items:center;justify-content:center;}
  #loginPage.show{display:flex;}
  .login-wrap{width:100%;max-width:430px;padding:20px;}
  .login-card{background:rgba(26,42,94,0.85);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:20px;padding:38px;box-shadow:0 20px 60px rgba(0,0,0,0.4);}
  .login-hd{text-align:center;margin-bottom:28px;}
  .login-hd .ico{font-size:2.8rem;margin-bottom:10px;}
  .login-hd h2{font-family:'Syne',sans-serif;font-size:1.7rem;font-weight:800;}
  .login-hd h2 span{background:linear-gradient(90deg,var(--accent),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  .login-hd p{color:var(--muted);font-size:0.84rem;margin-top:4px;}
  .tab-sw{display:flex;background:rgba(255,255,255,0.05);border-radius:10px;padding:3px;margin-bottom:24px;}
  .tab-btn{flex:1;padding:9px;border:none;background:transparent;color:var(--muted);font-family:'Space Grotesk',sans-serif;font-size:0.86rem;font-weight:600;border-radius:8px;cursor:pointer;transition:.2s;}
  .tab-btn.on{background:var(--accent);color:#fff;}
  .fg{margin-bottom:16px;}
  .fg label{display:block;font-size:0.8rem;color:var(--muted);margin-bottom:6px;font-weight:500;}
  .fg input{width:100%;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:10px;padding:11px 15px;color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:0.9rem;outline:none;transition:.2s;}
  .fg input:focus{border-color:var(--accent);}
  .forgot{text-align:right;margin:-8px 0 14px;}
  .forgot a{color:var(--teal);font-size:0.8rem;cursor:pointer;}
  .forgot a:hover{text-decoration:underline;}
  .btn-pri{width:100%;padding:13px;background:linear-gradient(135deg,var(--accent),#5a52d5);border:none;border-radius:10px;color:#fff;font-family:'Syne',sans-serif;font-size:0.96rem;font-weight:700;cursor:pointer;transition:.2s;}
  .btn-pri:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(108,99,255,0.4);}
  .divider{text-align:center;color:var(--muted);font-size:0.78rem;margin:18px 0;position:relative;}
  .divider::before,.divider::after{content:'';position:absolute;top:50%;width:40%;height:1px;background:var(--border);}
  .divider::before{left:0;}.divider::after{right:0;}
  .soc-btns{display:flex;gap:10px;}
  .soc-btn{flex:1;padding:10px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:0.83rem;cursor:pointer;transition:.2s;font-family:'Space Grotesk',sans-serif;}
  .soc-btn:hover{background:rgba(255,255,255,0.1);}
  .msg-success{background:rgba(0,212,170,0.1);border:1px solid rgba(0,212,170,0.3);color:var(--teal);padding:10px 14px;border-radius:8px;font-size:0.83rem;margin-top:12px;display:none;}
   /* PAGES */
  .page{display:none;min-height:100vh;}
  /* DASHBOARD */
  #dashboard{padding-top:68px;}
  .hero{padding:56px 40px 36px;background:radial-gradient(ellipse at 30% 50%,rgba(108,99,255,0.15),transparent 60%);text-align:center;}
  .hero-greet{font-size:0.85rem;color:var(--teal);font-weight:600;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;}
  .hero-title{font-family:'Syne',sans-serif;font-size:2.6rem;font-weight:800;line-height:1.15;margin-bottom:14px;}
  .hero-title .hl{background:linear-gradient(90deg,var(--accent),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  .hero-sub{color:var(--muted);font-size:0.95rem;max-width:480px;margin:0 auto 26px;}
  .hero-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
  .btn-teal{padding:12px 26px;background:linear-gradient(135deg,var(--teal),#00b894);border:none;border-radius:10px;color:#0d1b3e;font-family:'Syne',sans-serif;font-weight:700;font-size:0.9rem;cursor:pointer;transition:.2s;}
  .btn-teal:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(0,212,170,0.35);}
  .btn-ghost{padding:12px 26px;background:transparent;border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:0.9rem;cursor:pointer;transition:.2s;}
  .btn-ghost:hover{background:rgba(255,255,255,0.05);}
  .btn-acc{padding:11px 20px;background:linear-gradient(135deg,var(--accent),#5a52d5);border:none;border-radius:10px;color:#fff;font-family:'Syne',sans-serif;font-weight:700;font-size:0.86rem;cursor:pointer;transition:.2s;}
  .btn-acc:hover{box-shadow:0 4px 18px rgba(108,99,255,0.4);}
   /* STATS */
  .stats-row{display:flex;gap:14px;padding:0 40px 36px;flex-wrap:wrap;}
  .stat-card{flex:1;min-width:150px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;position:relative;overflow:hidden;}
  .stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
  .sc1::before{background:linear-gradient(90deg,var(--accent),#8b7cff);}
  .sc2::before{background:linear-gradient(90deg,var(--teal),#00f5d4);}
  .sc3::before{background:linear-gradient(90deg,var(--gold),#ffdd57);}
  .sc4::before{background:linear-gradient(90deg,var(--coral),#ff9f9f);}
  .stat-ico{font-size:1.5rem;margin-bottom:8px;}
  .stat-v{font-family:'Syne',sans-serif;font-size:1.9rem;font-weight:800;}
  .stat-l{color:var(--muted);font-size:0.78rem;margin-top:3px;}
  
   /* SEC TITLE */
  .sec-title{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:700;margin-bottom:18px;display:flex;align-items:center;gap:8px;}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--teal);}
  /* FEATURES */
  .feat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px;padding:0 40px 36px;}
  .feat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:22px;cursor:pointer;transition:.25s;position:relative;overflow:hidden;}
  .feat-card:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,0.3),var(--glow);border-color:var(--accent);}
  .feat-ico{font-size:1.9rem;margin-bottom:12px;}
  .feat-name{font-family:'Syne',sans-serif;font-weight:700;font-size:0.96rem;margin-bottom:5px;}
  .feat-desc{color:var(--muted);font-size:0.8rem;line-height:1.5;}
  .feat-badge{position:absolute;top:12px;right:12px;font-size:0.68rem;font-weight:700;padding:3px 8px;border-radius:20px;}
  .bc{background:rgba(108,99,255,0.2);color:var(--accent);}
  .bo{background:rgba(245,197,24,0.15);color:var(--gold);}
